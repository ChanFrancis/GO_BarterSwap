services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://barterswap:${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD dans .env}@db:5432/barterswap?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: barterswap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: barterswap
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barterswap"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
