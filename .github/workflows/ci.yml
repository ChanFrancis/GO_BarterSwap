# Intégration continue : à chaque push et Pull Request, le code est
# formaté (gofmt), analysé (go vet), testé (go test) et l'image Docker
# est construite. Un échec bloque le merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Format, vet et tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vérifier le formatage (gofmt)
        run: |
          fichiers=$(gofmt -l .)
          if [ -n "$fichiers" ]; then
            echo "Fichiers non formatés (lancez gofmt -w .) :"
            echo "$fichiers"
            exit 1
          fi

      - name: Analyse statique (go vet)
        run: go vet ./...

      - name: Tests
        run: go test ./...

  docker:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Construire l'image
        run: docker build -t barterswap .
