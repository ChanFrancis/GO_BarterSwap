# Intégration continue : à chaque push et Pull Request, le code est
# formaté (gofmt), analysé (go vet), testé (go test) et l'image Docker
# est construite. Un échec bloque le merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Format, vet et tests
    runs-on: ubuntu-latest

    # Base PostgreSQL éphémère pour les tests d'intégration.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vérifier le formatage (gofmt)
        run: |
          fichiers=$(gofmt -l .)
          if [ -n "$fichiers" ]; then
            echo "Fichiers non formatés (lancez gofmt -w .) :"
            echo "$fichiers"
            exit 1
          fi

      - name: Analyse statique (go vet)
        run: go vet ./...

      - name: Tests avec couverture (seuil ≥ 60 %)
        run: |
          go test -covermode=set -coverprofile=cover.out ./...
          couverture=$(go tool cover -func=cover.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Couverture : ${couverture} %"
          seuil=60
          if awk "BEGIN {exit !($couverture < $seuil)}"; then
            echo "Couverture ${couverture} % inférieure au seuil de ${seuil} %"
            exit 1
          fi

  docker:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Construire l'image
        run: docker build -t barterswap .
